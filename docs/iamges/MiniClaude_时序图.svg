<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1300 1500" font-family="Microsoft YaHei, SimHei, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#475569"/></marker>
    <marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/></marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#16a34a"/></marker>
    <marker id="arrowOrange" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#ea580c"/></marker>
    <marker id="arrowPurple" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#7c3aed"/></marker>
    <marker id="arrowRed" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#dc2626"/></marker>
    <marker id="arrowBack" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#94a3b8"/></marker>
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" style="stop-color:#1e3a5f"/><stop offset="100%" style="stop-color:#2563eb"/></linearGradient>
    <filter id="shadow" x="-1%" y="-1%" width="102%" height="102%"><feDropShadow dx="1" dy="1" stdDeviation="2" flood-opacity="0.1"/></filter>
  </defs>

  <!-- Background -->
  <rect width="1300" height="1500" fill="#f8fafc"/>

  <!-- Title -->
  <rect x="0" y="0" width="1300" height="50" fill="url(#headerGrad)"/>
  <text x="650" y="32" text-anchor="middle" fill="white" font-size="19" font-weight="bold">MiniClaude 时序图 — 用户发送消息到 Agent 响应的完整流程</text>

  <!-- ===== Lifelines ===== -->
  <!-- Headers -->
  <rect x="30" y="100" width="120" height="36" rx="6" fill="#2563eb" filter="url(#shadow)"/>
  <text x="90" y="123" text-anchor="middle" fill="white" font-size="12" font-weight="bold">用户 (User)</text>

  <rect x="195" y="100" width="120" height="36" rx="6" fill="#3b82f6" filter="url(#shadow)"/>
  <text x="255" y="123" text-anchor="middle" fill="white" font-size="12" font-weight="bold">mini-tui</text>

  <rect x="370" y="100" width="120" height="36" rx="6" fill="#22c55e" filter="url(#shadow)"/>
  <text x="430" y="123" text-anchor="middle" fill="white" font-size="12" font-weight="bold">SocketServer</text>

  <rect x="545" y="100" width="120" height="36" rx="6" fill="#f59e0b" filter="url(#shadow)"/>
  <text x="605" y="123" text-anchor="middle" fill="white" font-size="12" font-weight="bold">SessionManager</text>

  <rect x="720" y="100" width="120" height="36" rx="6" fill="#dc2626" filter="url(#shadow)"/>
  <text x="780" y="123" text-anchor="middle" fill="white" font-size="12" font-weight="bold">AgentLoop</text>

  <rect x="895" y="100" width="120" height="36" rx="6" fill="#7c3aed" filter="url(#shadow)"/>
  <text x="955" y="123" text-anchor="middle" fill="white" font-size="12" font-weight="bold">AnthropicProvider</text>

  <rect x="1070" y="100" width="120" height="36" rx="6" fill="#ea580c" filter="url(#shadow)"/>
  <text x="1130" y="123" text-anchor="middle" fill="white" font-size="12" font-weight="bold">ToolRegistry</text>

  <!-- Lifelines (dashed vertical lines) -->
  <line x1="90" y1="136" x2="90" y2="1470" stroke="#cbd5e1" stroke-width="1.5" stroke-dasharray="6,4"/>
  <line x1="255" y1="136" x2="255" y2="1470" stroke="#cbd5e1" stroke-width="1.5" stroke-dasharray="6,4"/>
  <line x1="430" y1="136" x2="430" y2="1470" stroke="#cbd5e1" stroke-width="1.5" stroke-dasharray="6,4"/>
  <line x1="605" y1="136" x2="605" y2="1470" stroke="#cbd5e1" stroke-width="1.5" stroke-dasharray="6,4"/>
  <line x1="780" y1="136" x2="780" y2="1470" stroke="#cbd5e1" stroke-width="1.5" stroke-dasharray="6,4"/>
  <line x1="955" y1="136" x2="955" y2="1470" stroke="#cbd5e1" stroke-width="1.5" stroke-dasharray="6,4"/>
  <line x1="1130" y1="136" x2="1130" y2="1470" stroke="#cbd5e1" stroke-width="1.5" stroke-dasharray="6,4"/>

  <!-- ===== PHASE 1: 连接与会话创建 ===== -->
  <rect x="10" y="80" width="24" height="560" rx="4" fill="#e0e7ff"/>
  <text x="23" y="360" text-anchor="middle" fill="#4338ca" font-size="11" font-weight="bold" writing-mode="tb" letter-spacing="3">第一阶段: 连接与初始化</text>

  <!-- Step 1: 用户启动 -->
  <line x1="90" y1="160" x2="255" y2="180" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arrowBlue)"/>
  <text x="175" y="175" text-anchor="middle" fill="#2563eb" font-size="10" font-weight="bold">1. 启动 TUI</text>

  <!-- Step 2: TUI 连接 -->
  <line x1="255" y1="195" x2="430" y2="215" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arrowBlue)"/>
  <text x="345" y="210" text-anchor="middle" fill="#2563eb" font-size="10">2. TCP 连接 127.0.0.1:7437</text>

  <!-- Step 3: 订阅事件 -->
  <line x1="255" y1="230" x2="430" y2="250" stroke="#16a34a" stroke-width="1.5" marker-end="url(#arrowGreen)"/>
  <text x="345" y="245" text-anchor="middle" fill="#16a34a" font-size="10">3. event.subscribe(22 patterns)</text>

  <!-- Response -->
  <line x1="430" y1="260" x2="255" y2="280" stroke="#94a3b8" stroke-width="1.2" marker-end="url(#arrowBack)"/>
  <text x="345" y="275" text-anchor="middle" fill="#94a3b8" font-size="9">◀ subscribed OK</text>

  <!-- Step 4: 创建会话 -->
  <line x1="255" y1="295" x2="605" y2="320" stroke="#f59e0b" stroke-width="1.5" marker-end="url(#arrowOrange)"/>
  <text x="430" y="310" text-anchor="middle" fill="#f59e0b" font-size="10">4. session.create(mode="chat")</text>

  <!-- Session created -->
  <line x1="605" y1="340" x2="255" y2="365" stroke="#94a3b8" stroke-width="1.2" marker-end="url(#arrowBack)"/>
  <text x="430" y="355" text-anchor="middle" fill="#94a3b8" font-size="9">◀ session_id: a1b2c3d4</text>

  <!-- Prompt shown -->
  <line x1="255" y1="380" x2="90" y2="400" stroke="#94a3b8" stroke-width="1.2" marker-end="url(#arrowBack)"/>
  <text x="175" y="395" text-anchor="middle" fill="#94a3b8" font-size="9">◀ 显示输入提示</text>

  <!-- Step 5: 用户输入 -->
  <line x1="90" y1="420" x2="255" y2="440" stroke="#2563eb" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <text x="175" y="435" text-anchor="middle" fill="#2563eb" font-size="10" font-weight="bold">5. 输入: "总结 README.md"</text>

  <!-- Step 6: 发送消息 -->
  <line x1="255" y1="460" x2="605" y2="485" stroke="#f59e0b" stroke-width="1.5" marker-end="url(#arrowOrange)"/>
  <text x="430" y="475" text-anchor="middle" fill="#f59e0b" font-size="10">6. session.send_message(session_id, content)</text>

  <!-- Step 7: 持久化 -->
  <rect x="590" y="495" width="210" height="24" rx="4" fill="#fef3c7" stroke="#f59e0b" stroke-width="0.5"/>
  <text x="695" y="512" text-anchor="middle" fill="#92400e" font-size="9">存储用户消息到 thread.jsonl</text>

  <!-- Step 8: 创建 AgentRunner -->
  <line x1="605" y1="530" x2="605" y2="560" stroke="#475569" stroke-width="1"/>
  <rect x="560" y="560" width="270" height="30" rx="4" fill="#fef2f2" stroke="#ef4444" stroke-width="0.5"/>
  <text x="695" y="580" text-anchor="middle" fill="#991b1b" font-size="10">7. 创建 AgentRunner → AgentLoop</text>

  <!-- Step 8b: Skill 检查 -->
  <line x1="605" y1="590" x2="605" y2="610" stroke="#dc2626" stroke-width="1"/>

  <!-- ===== PHASE 2: Agent Loop ===== -->
  <rect x="10" y="620" width="24" height="700" rx="4" fill="#fecaca"/>
  <text x="23" y="970" text-anchor="middle" fill="#991b1b" font-size="11" font-weight="bold" writing-mode="tb" letter-spacing="3">第二阶段: Agent Loop (ReAct)</text>

  <!-- Step 9: Plan -->
  <rect x="560" y="640" width="270" height="30" rx="4" fill="#dbeafe" stroke="#3b82f6" stroke-width="0.5"/>
  <text x="695" y="660" text-anchor="middle" fill="#1e40af" font-size="11" font-weight="bold">8. Plan — LLM.chat(messages, tools)</text>

  <line x1="780" y1="655" x2="955" y2="685" stroke="#7c3aed" stroke-width="2" marker-end="url(#arrowPurple)"/>
  <text x="870" y="675" text-anchor="middle" fill="#7c3aed" font-size="10">8a. Anthropic API Streaming</text>

  <!-- LLM Response -->
  <rect x="940" y="690" width="210" height="40" rx="4" fill="#f5f3ff" stroke="#a5b4fc" stroke-width="0.5"/>
  <text x="1045" y="708" text-anchor="middle" fill="#4338ca" font-size="10">thinking + text + tool_use</text>
  <text x="1045" y="722" text-anchor="middle" fill="#64748b" font-size="9">(流式 token + prompt caching)</text>

  <!-- Token events flow back -->
  <line x1="955" y1="732" x2="780" y2="760" stroke="#c4b5fd" stroke-width="1.2" marker-end="url(#arrowBack)"/>
  <text x="870" y="750" text-anchor="middle" fill="#7c3aed" font-size="9">◀ LlmTokenEvent (每个 token)</text>

  <!-- Publish to TUI -->
  <line x1="780" y1="775" x2="430" y2="800" stroke="#dc2626" stroke-width="1.2" marker-end="url(#arrowRed)"/>
  <text x="605" y="790" text-anchor="middle" fill="#dc2626" font-size="9">IpcBroadcaster → 推送到订阅客户端</text>
  <line x1="430" y1="810" x2="255" y2="830" stroke="#dc2626" stroke-width="1.2" marker-end="url(#arrowRed)"/>
  <line x1="255" y1="840" x2="90" y2="855" stroke="#dc2626" stroke-width="1.2" marker-end="url(#arrowRed)"/>
  <text x="175" y="855" text-anchor="middle" fill="#dc2626" font-size="9">实时流式显示</text>

  <!-- Step 9: Observe - append to context -->
  <rect x="760" y="870" width="200" height="30" rx="4" fill="#fce7f3" stroke="#ec4899" stroke-width="0.5"/>
  <text x="860" y="890" text-anchor="middle" fill="#9d174d" font-size="10">9. Observe — 追加到 context</text>

  <!-- Step 10: Act -->
  <rect x="560" y="920" width="270" height="30" rx="4" fill="#d1fae5" stroke="#10b981" stroke-width="0.5"/>
  <text x="695" y="940" text-anchor="middle" fill="#065f46" font-size="11" font-weight="bold">10. Act — invoke_tool(item)</text>

  <!-- Tool call to ToolRegistry -->
  <line x1="780" y1="935" x2="1130" y2="960" stroke="#ea580c" stroke-width="2" marker-end="url(#arrowOrange)"/>
  <text x="955" y="952" text-anchor="middle" fill="#ea580c" font-size="10">10a. 查找 + 执行工具</text>

  <!-- Tool execution detail -->
  <rect x="1090" y="965" width="180" height="70" rx="4" fill="#fff7ed" stroke="#f97316" stroke-width="0.5"/>
  <text x="1180" y="983" text-anchor="middle" fill="#9a3412" font-size="9">1. 参数校验 (Pydantic)</text>
  <text x="1180" y="998" text-anchor="middle" fill="#9a3412" font-size="9">2. 权限审查 (6级)</text>
  <text x="1180" y="1013" text-anchor="middle" fill="#9a3412" font-size="9">3. asyncio.wait_for(120s)</text>
  <text x="1180" y="1028" text-anchor="middle" fill="#9a3412" font-size="9">4. 失败重试 2 次</text>

  <!-- Permission branching -->
  <polygon points="890,1045 980,1075 890,1105 800,1075" fill="white" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="890" y="1072" text-anchor="middle" fill="#92400e" font-size="9">权限?</text>
  <text x="890" y="1086" text-anchor="middle" fill="#b45309" font-size="8">需要用户?</text>

  <!-- yes - ask user -->
  <line x1="890" y1="1075" x2="890" y2="1120" stroke="#f59e0b" stroke-width="1.2" marker-end="url(#arrowOrange)"/>
  <text x="905" y="1100" fill="#f59e0b" font-size="9">需要</text>

  <rect x="830" y="1125" width="120" height="50" rx="4" fill="#fef3c7" stroke="#f59e0b" stroke-width="0.5"/>
  <text x="890" y="1143" text-anchor="middle" fill="#92400e" font-size="9">推送事件</text>
  <text x="890" y="1158" text-anchor="middle" fill="#92400e" font-size="9">PermissionRequested</text>

  <line x1="830" y1="1150" x2="430" y2="1175" stroke="#f59e0b" stroke-width="1.2" marker-end="url(#arrowOrange)"/>
  <text x="630" y="1165" text-anchor="middle" fill="#f59e0b" font-size="9">IpcBroadcaster → TUI</text>
  <line x1="430" y1="1185" x2="255" y2="1200" stroke="#f59e0b" stroke-width="1.2" marker-end="url(#arrowOrange)"/>
  <line x1="255" y1="1210" x2="90" y2="1225" stroke="#f59e0b" stroke-width="1.2" marker-end="url(#arrowOrange)"/>
  <text x="175" y="1225" text-anchor="middle" fill="#f59e0b" font-size="9">弹窗显示权限请求</text>

  <!-- User decision -->
  <line x1="90" y1="1245" x2="255" y2="1265" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arrowBlue)"/>
  <text x="175" y="1260" text-anchor="middle" fill="#2563eb" font-size="10">用户选择 [y]Allow</text>

  <line x1="255" y1="1280" x2="605" y2="1305" stroke="#f59e0b" stroke-width="1.2" marker-end="url(#arrowOrange)"/>
  <text x="430" y="1295" text-anchor="middle" fill="#f59e0b" font-size="9">permission.respond(allow)</text>

  <!-- auto-allow path -->
  <line x1="800" y1="1080" x2="740" y2="1110" stroke="#16a34a" stroke-width="1.2" marker-end="url(#arrowGreen)"/>
  <text x="765" y="1098" fill="#16a34a" font-size="8">自动</text>

  <!-- Tool result back to AgentLoop -->
  <line x1="1130" y1="1050" x2="780" y2="1330" stroke="#ea580c" stroke-width="1.5" marker-end="url(#arrowOrange)"/>
  <text x="990" y="1300" text-anchor="middle" fill="#ea580c" font-size="10">◀ ToolResult</text>

  <!-- Step 11: Observe result -->
  <rect x="760" y="1315" width="200" height="30" rx="4" fill="#fce7f3" stroke="#ec4899" stroke-width="0.5"/>
  <text x="860" y="1335" text-anchor="middle" fill="#9d174d" font-size="10">11. Observe — 注入工具结果</text>

  <!-- ===== PHASE 3: 循环/结束 ===== -->
  <rect x="10" y="1380" width="24" height="100" rx="4" fill="#d1fae5"/>
  <text x="23" y="1430" text-anchor="middle" fill="#065f46" font-size="11" font-weight="bold" writing-mode="tb" letter-spacing="3">第三阶段: 结束</text>

  <!-- Loop back decision -->
  <polygon points="600,1365 680,1390 600,1415 520,1390" fill="white" stroke="#dc2626" stroke-width="1.5"/>
  <text x="600" y="1388" text-anchor="middle" fill="#991b1b" font-size="9">完成?</text>
  <text x="600" y="1402" text-anchor="middle" fill="#ef4444" font-size="8">stop/max</text>

  <!-- No - loop back -->
  <line x1="520" y1="1390" x2="100" y2="1390" stroke="#dc2626" stroke-width="1.2"/>
  <line x1="100" y1="1390" x2="100" y2="650" stroke="#dc2626" stroke-width="1.2" marker-end="url(#arrowRed)"/>
  <text x="85" y="1020" text-anchor="middle" fill="#dc2626" font-size="9" writing-mode="tb">否 → 继续循环 (Plan)</text>

  <!-- Yes - finish -->
  <line x1="680" y1="1390" x2="780" y2="1390" stroke="#16a34a" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <text x="730" y="1383" fill="#16a34a" font-size="10" font-weight="bold">是</text>

  <!-- Step 12: Finish -->
  <rect x="760" y="1375" width="200" height="35" rx="4" fill="#dcfce7" stroke="#16a34a" stroke-width="0.5"/>
  <text x="860" y="1398" text-anchor="middle" fill="#166534" font-size="10">12. 发布 RunFinishedEvent</text>

  <!-- Save to session -->
  <line x1="780" y1="1410" x2="605" y2="1430" stroke="#16a34a" stroke-width="1.2" marker-end="url(#arrowGreen)"/>
  <text x="695" y="1425" text-anchor="middle" fill="#16a34a" font-size="9">13. 存储消息到 thread.jsonl</text>

  <!-- Notify TUI -->
  <line x1="605" y1="1445" x2="430" y2="1465" stroke="#16a34a" stroke-width="1.2" marker-end="url(#arrowGreen)"/>
  <line x1="430" y1="1475" x2="255" y2="1490" stroke="#16a34a" stroke-width="1.2" marker-end="url(#arrowGreen)"/>
  <text x="345" y="1490" text-anchor="middle" fill="#16a34a" font-size="9">14. 推送完成事件到 TUI</text>
  <line x1="255" y1="1505" x2="90" y2="1520" stroke="#16a34a" stroke-width="1.2" marker-end="url(#arrowGreen)"/>
  <text x="175" y="1520" text-anchor="middle" fill="#16a34a" font-size="10" font-weight="bold">15. 显示最终结果</text>

  <!-- Legend -->
  <rect x="1100" y="10" width="180" height="180" rx="8" fill="white" stroke="#cbd5e1" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="1190" y="35" text-anchor="middle" fill="#475569" font-size="12" font-weight="bold">图例</text>
  <line x1="1115" y1="50" x2="1155" y2="50" stroke="#2563eb" stroke-width="2"/>
  <text x="1165" y="54" fill="#475569" font-size="10">用户操作</text>
  <line x1="1115" y1="70" x2="1155" y2="70" stroke="#f59e0b" stroke-width="2"/>
  <text x="1165" y="74" fill="#475569" font-size="10">会话/消息</text>
  <line x1="1115" y1="90" x2="1155" y2="90" stroke="#7c3aed" stroke-width="2"/>
  <text x="1165" y="94" fill="#475569" font-size="10">LLM 调用</text>
  <line x1="1115" y1="110" x2="1155" y2="110" stroke="#ea580c" stroke-width="2"/>
  <text x="1165" y="114" fill="#475569" font-size="10">工具执行</text>
  <line x1="1115" y1="130" x2="1155" y2="130" stroke="#16a34a" stroke-width="2"/>
  <text x="1165" y="134" fill="#475569" font-size="10">成功/完成</text>
  <line x1="1115" y1="150" x2="1155" y2="150" stroke="#dc2626" stroke-width="2"/>
  <text x="1165" y="154" fill="#475569" font-size="10">事件/循环</text>
  <line x1="1115" y1="170" x2="1155" y2="170" stroke="#94a3b8" stroke-width="1.2" stroke-dasharray="4,3"/>
  <text x="1165" y="174" fill="#475569" font-size="10">异步响应</text>
</svg>
