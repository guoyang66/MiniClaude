<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 1550" font-family="Microsoft YaHei, SimHei, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555"/>
    </marker>
    <marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/>
    </marker>
    <marker id="arrowRed" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#dc2626"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#16a34a"/>
    </marker>
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1e3a5f;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#2563eb;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="startGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#16a34a;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#22c55e;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="loopGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8fafc;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#e2e8f0;stop-opacity:1"/>
    </linearGradient>
    <filter id="shadow" x="-3%" y="-3%" width="106%" height="106%">
      <feDropShadow dx="1" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="1550" fill="#f1f5f9"/>

  <!-- Title Bar -->
  <rect x="0" y="0" width="900" height="60" fill="url(#headerGrad)"/>
  <text x="450" y="38" text-anchor="middle" fill="white" font-size="22" font-weight="bold">MiniClaude 业务流程图 (Business Flow)</text>

  <!-- ===== Nodes ===== -->

  <!-- 1. Start -->
  <rect x="300" y="85" width="300" height="50" rx="25" fill="url(#startGrad)" filter="url(#shadow)"/>
  <text x="450" y="116" text-anchor="middle" fill="white" font-size="16" font-weight="bold">开始</text>
  <line x1="450" y1="135" x2="450" y2="160" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- 2. 启动守护进程 -->
  <rect x="275" y="162" width="350" height="48" rx="8" fill="white" stroke="#2563eb" stroke-width="2" filter="url(#shadow)"/>
  <text x="450" y="192" text-anchor="middle" fill="#1e3a5f" font-size="15" font-weight="bold">启动 mini-core 守护进程</text>
  <text x="450" y="205" text-anchor="middle" fill="#64748b" font-size="11">加载配置 → 初始化服务 → 绑定 TCP :7437</text>
  <line x1="450" y1="210" x2="450" y2="235" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- 3. 用户启动客户端 -->
  <rect x="275" y="237" width="350" height="48" rx="8" fill="white" stroke="#2563eb" stroke-width="2" filter="url(#shadow)"/>
  <text x="450" y="267" text-anchor="middle" fill="#1e3a5f" font-size="15" font-weight="bold">用户启动 mini-tui / mini CLI</text>
  <line x1="450" y1="285" x2="450" y2="310" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- 4. TCP 连接 -->
  <rect x="275" y="312" width="350" height="48" rx="8" fill="white" stroke="#2563eb" stroke-width="2" filter="url(#shadow)"/>
  <text x="450" y="342" text-anchor="middle" fill="#1e3a5f" font-size="15" font-weight="bold">TCP 连接 127.0.0.1:7437</text>
  <text x="450" y="355" text-anchor="middle" fill="#64748b" font-size="11">JSON-RPC 2.0 / NDJSON 协议</text>
  <line x1="450" y1="360" x2="450" y2="385" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- 5. 订阅事件 -->
  <rect x="275" y="387" width="350" height="48" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2" filter="url(#shadow)"/>
  <text x="450" y="417" text-anchor="middle" fill="#92400e" font-size="15" font-weight="bold">订阅事件 (event.subscribe)</text>
  <text x="450" y="430" text-anchor="middle" fill="#b45309" font-size="11">订阅 22 个 topic patterns: run.* step.* llm.* tool.* 等</text>
  <line x1="450" y1="435" x2="450" y2="460" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- 6. 创建会话 -->
  <rect x="275" y="462" width="350" height="48" rx="8" fill="white" stroke="#2563eb" stroke-width="2" filter="url(#shadow)"/>
  <text x="450" y="492" text-anchor="middle" fill="#1e3a5f" font-size="15" font-weight="bold">创建会话 (session.create)</text>
  <text x="450" y="505" text-anchor="middle" fill="#64748b" font-size="11">mode: one_shot / chat → meta.json + thread.jsonl</text>
  <line x1="450" y1="510" x2="450" y2="535" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- 7. 用户输入 -->
  <rect x="275" y="537" width="350" height="48" rx="8" fill="white" stroke="#8b5cf6" stroke-width="2" filter="url(#shadow)"/>
  <text x="450" y="567" text-anchor="middle" fill="#6d28d9" font-size="15" font-weight="bold">用户输入目标 (session.send_message)</text>
  <text x="450" y="580" text-anchor="middle" fill="#7c3aed" font-size="11">支持 /skill 斜杠命令 → 加载 Skill 配置</text>
  <line x1="450" y1="585" x2="450" y2="610" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- 8. AgentLoop Container -->
  <rect x="60" y="612" width="780" height="660" rx="12" fill="url(#loopGrad)" stroke="#94a3b8" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="450" y="640" text-anchor="middle" fill="#475569" font-size="17" font-weight="bold">Agent Loop (ReAct 循环)</text>

  <!-- 8a. Step 1: Plan -->
  <rect x="260" y="660" width="380" height="58" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
  <text x="450" y="685" text-anchor="middle" fill="#1e40af" font-size="14" font-weight="bold">Step 1: Plan (推理规划)</text>
  <text x="450" y="705" text-anchor="middle" fill="#3b82f6" font-size="11">AnthropicProvider.chat() → 流式 token → tool_use 决策</text>
  <line x1="450" y1="718" x2="450" y2="743" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- 8b. Step 2: Act -->
  <rect x="190" y="745" width="520" height="110" rx="8" fill="#d1fae5" stroke="#10b981" stroke-width="1.5"/>
  <text x="450" y="770" text-anchor="middle" fill="#065f46" font-size="14" font-weight="bold">Step 2: Act (执行工具调用)</text>
  <rect x="210" y="785" width="155" height="28" rx="6" fill="white" stroke="#10b981" stroke-width="1"/>
  <text x="287" y="803" text-anchor="middle" fill="#047857" font-size="11">Bash 命令执行</text>
  <rect x="375" y="785" width="155" height="28" rx="6" fill="white" stroke="#10b981" stroke-width="1"/>
  <text x="452" y="803" text-anchor="middle" fill="#047857" font-size="11">读写文件</text>
  <rect x="540" y="785" width="155" height="28" rx="6" fill="white" stroke="#10b981" stroke-width="1"/>
  <text x="617" y="803" text-anchor="middle" fill="#047857" font-size="11">MCP / 子 Agent</text>
  <text x="450" y="845" text-anchor="middle" fill="#047857" font-size="11">invoke_tool() → 参数校验 → 超时 120s → 重试 2 次</text>
  <line x1="450" y1="855" x2="450" y2="880" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- 8c. Permission Check -->
  <rect x="190" y="882" width="520" height="78" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="450" y="907" text-anchor="middle" fill="#92400e" font-size="14" font-weight="bold">Permission Check (权限审查)</text>
  <text x="450" y="928" text-anchor="middle" fill="#b45309" font-size="11">6 级优先级: deny_patterns → CWD 检查 → session 缓存 → 持久缓存 → allow_patterns → 工具默认值</text>
  <text x="450" y="948" text-anchor="middle" fill="#d97706" font-size="11">自动允许 │ 自动拒绝 │ 推送 permission.requested 事件 → 等待用户响应 (60s 超时)</text>
  <line x1="450" y1="960" x2="450" y2="985" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- 8d. Step 3: Observe -->
  <rect x="260" y="987" width="380" height="48" rx="8" fill="#fce7f3" stroke="#ec4899" stroke-width="1.5"/>
  <text x="450" y="1012" text-anchor="middle" fill="#9d174d" font-size="14" font-weight="bold">Step 3: Observe (观察结果)</text>
  <text x="450" y="1028" text-anchor="middle" fill="#be185d" font-size="11">将工具结果注入上下文 → 作为 user message 追加到消息列表</text>
  <line x1="450" y1="1035" x2="450" y2="1060" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- 8e. Decision Diamond -->
  <polygon points="450,1062 580,1115 450,1168 320,1115" fill="white" stroke="#dc2626" stroke-width="2" filter="url(#shadow)"/>
  <text x="450" y="1111" text-anchor="middle" fill="#991b1b" font-size="13" font-weight="bold">判断终止?</text>
  <text x="450" y="1127" text-anchor="middle" fill="#ef4444" font-size="10">stop_reason / max_steps</text>

  <!-- No → back to Plan -->
  <line x1="320" y1="1115" x2="120" y2="1115" stroke="#dc2626" stroke-width="1.5" marker-end="url(#arrowRed)"/>
  <line x1="120" y1="1115" x2="120" y2="689" stroke="#dc2626" stroke-width="1.5" marker-end="url(#arrowRed)"/>
  <text x="105" y="910" text-anchor="middle" fill="#dc2626" font-size="11" writing-mode="tb" glyph-orientation-vertical="0">否 → 继续循环</text>

  <!-- 8f. Compaction sub-check -->
  <rect x="110" y="1130" width="225" height="42" rx="6" fill="#fee2e2" stroke="#ef4444" stroke-width="1"/>
  <text x="222" y="1149" text-anchor="middle" fill="#991b1b" font-size="11" font-weight="bold">上下文超阈值?</text>
  <text x="222" y="1165" text-anchor="middle" fill="#dc2626" font-size="10">→ Compactor.compact() 压缩</text>
  <line x1="297" y1="1151" x2="320" y2="1151" stroke="#dc2626" stroke-width="1"/>

  <!-- Yes → out of loop -->
  <line x1="580" y1="1115" x2="780" y2="1115" stroke="#16a34a" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <text x="680" y="1108" text-anchor="middle" fill="#16a34a" font-size="11" font-weight="bold">是 → 退出循环</text>

  <!-- End of AgentLoop container -->
  <line x1="780" y1="1115" x2="780" y2="1295" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="780" y1="1295" x2="450" y2="1295" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- 9. 输出结果 -->
  <rect x="275" y="1297" width="350" height="48" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="2" filter="url(#shadow)"/>
  <text x="450" y="1327" text-anchor="middle" fill="#166534" font-size="15" font-weight="bold">输出最终结果 &amp; 保存会话</text>
  <text x="450" y="1340" text-anchor="middle" fill="#64748b" font-size="11">发布 RunFinishedEvent → 写入 thread.jsonl / events.jsonl</text>
  <line x1="450" y1="1345" x2="450" y2="1370" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- 10. 会话状态 -->
  <rect x="275" y="1372" width="350" height="48" rx="8" fill="white" stroke="#8b5cf6" stroke-width="2" filter="url(#shadow)"/>
  <text x="450" y="1402" text-anchor="middle" fill="#6d28d9" font-size="15" font-weight="bold">会话状态更新</text>
  <text x="450" y="1415" text-anchor="middle" fill="#7c3aed" font-size="11">one_shot → closed │ chat → waiting_for_input (可继续输入)</text>
  <line x1="450" y1="1420" x2="450" y2="1445" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- 11. End -->
  <rect x="300" y="1447" width="300" height="50" rx="25" fill="#94a3b8" filter="url(#shadow)"/>
  <text x="450" y="1478" text-anchor="middle" fill="white" font-size="16" font-weight="bold">结束</text>

  <!-- Legend -->
  <rect x="30" y="1320" width="200" height="170" rx="8" fill="white" stroke="#cbd5e1" stroke-width="1"/>
  <text x="130" y="1345" text-anchor="middle" fill="#475569" font-size="13" font-weight="bold">图例</text>
  <rect x="45" y="1355" width="16" height="12" rx="2" fill="#dbeafe"/>
  <text x="70" y="1365" fill="#475569" font-size="11">LLM / Plan 阶段</text>
  <rect x="45" y="1375" width="16" height="12" rx="2" fill="#d1fae5"/>
  <text x="70" y="1385" fill="#475569" font-size="11">工具执行阶段</text>
  <rect x="45" y="1395" width="16" height="12" rx="2" fill="#fef3c7"/>
  <text x="70" y="1405" fill="#475569" font-size="11">事件 / 权限阶段</text>
  <rect x="45" y="1415" width="16" height="12" rx="2" fill="#fce7f3"/>
  <text x="70" y="1425" fill="#475569" font-size="11">观察阶段</text>
  <rect x="45" y="1435" width="16" height="12" rx="2" fill="#dcfce7"/>
  <text x="70" y="1445" fill="#475569" font-size="11">结果 / 输出</text>
  <line x1="45" y1="1460" x2="75" y2="1460" stroke="#16a34a" stroke-width="2"/>
  <text x="85" y="1464" fill="#475569" font-size="11">是 / 成功路径</text>
  <line x1="45" y1="1478" x2="75" y2="1478" stroke="#dc2626" stroke-width="2"/>
  <text x="85" y="1482" fill="#475569" font-size="11">否 / 循环路径</text>
</svg>
